apiVersion: v1
kind: Service
metadata:
  name: uhura-mock-kirk
  namespace: ulysses-demo
  labels:
    app.kubernetes.io/part-of: kavara
    app.kubernetes.io/component: validation-sandbox
    app.kubernetes.io/name: uhura-mock-kirk
  annotations:
    description: |
      Internal endpoint for the mock Kirk inference service. Validate Jobs
      hit this Service at http://uhura-mock-kirk:8000. Service name is stable
      across mock → real-Kirk image swap so dependent manifests don't change.
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: uhura-mock-kirk
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
