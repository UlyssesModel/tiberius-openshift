# PVC for the Sept tensor bundle generated by the uhura-tensor-generator Job.
# Mounted read-only by the validate Job at /data/tensors.
#
# Storage budget: 1Gi. Each Sept N=16 tensor is ~3KB compressed; 400 emits =
# ~1.2MB. Headroom for N=500 (50 emits × ~150KB = 7.5MB) and future runs.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uhura-tensor-bundle
  namespace: ulysses-demo
  labels:
    app.kubernetes.io/part-of: kavara
    app.kubernetes.io/component: validation-sandbox
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
