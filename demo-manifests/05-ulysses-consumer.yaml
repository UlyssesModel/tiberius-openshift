---
# Config for the Ulysses SOR consumer. Window sizes, thread placement hints,
# Kafka consumer group. The SOR itself reads hardware_id at startup from
# NFD-exposed CPUID labels and selects placement from its policy table.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ulysses-sor-config
  namespace: ulysses-demo
data:
  KAFKA_BOOTSTRAP: "kafka-cluster-kafka-bootstrap.ulysses-demo.svc:9093"
  KAFKA_CONSUMER_GROUP: "ulysses-sor-eqty"
  TOPIC_TRADES_IN: "market.equities.trades"
  TOPIC_QUOTES_IN: "market.equities.quotes"
  TOPIC_ENTROPY_OUT: "ulysses.entropy.equities"
  SECURITY_PROTOCOL: "SSL"
  WINDOW_SECONDS: "12"         # entropy emission cadence
  EMBED_DIM: "32"              # one EBM per ticker stream dimension
  SECOND_LAYER: "32"           # 32x32 cross-ticker second-layer stacking
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ulysses-sor
  namespace: ulysses-demo
  labels:
    app: ulysses-sor
    kavara.ai/workload-class: confidential-inference
  annotations:
    kavara.ai/tdx-required: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ulysses-sor
  template:
    metadata:
      labels:
        app: ulysses-sor
        kavara.ai/workload-class: confidential-inference
      annotations:
        # Ask scheduler to prefer nodes NFD has labelled with TDX and AMX.
        nfd.node.kubernetes.io/match-features: |
          - feature: cpu.cpuid
            matchExpressions:
              TDX_GUEST: {op: Exists}
              AMX_BF16: {op: Exists}
    spec:
      serviceAccountName: ulysses-sor
      # CONFIDENTIAL BOUNDARY ARCHITECTURE — substrate-dependent:
      #
      # GCP (ulysses-demo cluster):   per-pod Kata isolation. SOR runs in a Kata-VM,
      #                               isolated from neighboring pods. No host-level
      #                               TDX because OCP 4.21.x install-config schema
      #                               doesn't expose IntelTrustDomainExtensions for
      #                               GCP workers (verified via /proc/cpuinfo).
      #
      # Azure (ulysses-tdx-demo):     entire VM is the Trust Domain (DCesv6 host-level
      #                               TDX, dmesg confirms). Native runc — no per-pod
      #                               Kata because TDX guests block nested virt by
      #                               design (attack-surface reduction). Aligns with
      #                               Red Hat's CCO Developer Preview architecture.
      #
      # Same SOR code; the boundary moves with the substrate. Both are valid posture.
      containers:
        - name: sor
          # This is Kavara's image. For the demo we pull from Quay.
          # Production path is Red Hat Catalog / OperatorHub.
          image: quay.io/kavara/ulysses-sor:demo-v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ulysses-sor-config
          env:
            # Calibrated production optimum for GNR+TDX per KIRK study.
            - name: OMP_NUM_THREADS
              value: "32"
            - name: OMP_PROC_BIND
              value: "close"
            - name: OMP_PLACES
              value: "cores"
            - name: MALLOC_ARENA_MAX
              value: "4"
          volumeMounts:
            - name: kafka-certs
              mountPath: /etc/kafka-certs
              readOnly: true
          resources:
            # Asymmetric requests/limits sized for the 8-vCPU DC8es_v6 SNO
            # (~3-5 vCPU usable for user workloads after system + Kafka +
            # ingress + grafana). Production / multi-node should bump this
            # back up — the SOR's calibrated optimum is 32 threads on full
            # AMX silicon, so cpu=32 is the right symmetric target there.
            requests:
              cpu: "200m"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          ports:
            - name: metrics
              containerPort: 9100
          readinessProbe:
            httpGet: { path: /ready, port: 9100 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 9100 }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: kafka-certs
          # Strimzi user secret's ca.crt is the clients-CA (broker uses
          # it to verify clients), NOT the cluster-CA. Clients need
          # cluster-CA to verify broker certs. Project both into one
          # mount — see polygon-ingress for the same fix and 03 file.
          projected:
            sources:
              - secret:
                  name: ulysses-sor
                  items:
                    - { key: user.crt, path: user.crt }
                    - { key: user.key, path: user.key }
              - secret:
                  name: kafka-cluster-cluster-ca-cert
                  items:
                    - { key: ca.crt, path: ca.crt }
---
apiVersion: v1
kind: Service
metadata:
  name: ulysses-sor-metrics
  namespace: ulysses-demo
  labels:
    app: ulysses-sor
spec:
  selector:
    app: ulysses-sor
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
---
# HPA: scale consumer replicas by Kafka consumer-group lag (requires
# keda or the Strimzi kafka exporter producing consumergroup_lag metrics).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ulysses-sor
  namespace: ulysses-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ulysses-sor
  minReplicas: 1
  maxReplicas: 12
  metrics:
    - type: Pods
      pods:
        metric:
          name: kafka_consumergroup_lag
        target:
          type: AverageValue
          averageValue: "1000"
