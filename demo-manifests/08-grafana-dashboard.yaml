---
# OCP Console dashboard delivery — DEFERRED. The active observability
# path is the Grafana Operator deployment in 09-grafana-operator.yaml;
# this file is retained as a Path B reference for future v14 rewrites.
#
# Why deferred: OCP Console's built-in dashboard renderer is locked to
# legacy Grafana schema v14 (rows-based, ~2017 vintage). The Ulysses
# dashboard JSON at grafana/ulysses-demo-dashboard.json is authored in
# modern schema v40 (panels-based with gridPos). Console accepts the
# JSON via the ConfigMap pickup mechanism in `openshift-config-managed`
# and lists the title in Observe → Dashboards, but the panel area
# renders blank because Console can't parse the modern .panels[] array.
# See ../README.md "Observability" section for full context.
#
# Two ways forward if/when you want OCP-native rendering:
# 1) Rewrite the dashboard JSON in v14 schema (~1–2h grunt work; lose
#    smooth timeseries + heatmap-with-exemplars; map stat→singlestat,
#    timeseries→graph, heatmap→heatmap-legacy, table→table). Then this
#    file's stub ConfigMap pattern works.
# 2) Author a NEW v14-native dashboard scoped to ulysses-demo namespace
#    (manual or via Console UI export). Drop into this file's data
#    block as the canonical OCP-native artifact.
#
# Until either of those happens, this file is documentation. Apply does
# nothing meaningful (creates a placeholder ConfigMap that OCP Console
# will pick up and render blank — same as today's state).
#
# ORIGINAL DELIVERY DOCS (kept for reference if path is reactivated):
# OCP Console picks up dashboards from ConfigMaps in `openshift-config-managed`
# that carry the label `console.openshift.io/dashboard=true`. After
# `oc apply -f 08-grafana-dashboard.yaml`, regenerate the CM with the
# real dashboard JSON (must be v14-schema for Console to render):
#
#   oc -n openshift-config-managed create configmap ulysses-demo-dashboard \
#     --from-file=ulysses-demo-dashboard.json=grafana/ulysses-demo-dashboard.json \
#     --dry-run=client -o yaml | oc apply -f -
#   oc -n openshift-config-managed label configmap/ulysses-demo-dashboard \
#     console.openshift.io/dashboard=true --overwrite
#
# Then it appears at:  OCP Console → Observe → Dashboards →
# "Ulysses Entropy — Capital-Markets Demo Live"
apiVersion: v1
kind: ConfigMap
metadata:
  name: ulysses-demo-dashboard
  namespace: openshift-config-managed
  labels:
    console.openshift.io/dashboard: "true"
  annotations:
    kavara.ai/source-path: "grafana/ulysses-demo-dashboard.json"
data:
  # PLACEHOLDER — replace via the imperative `oc create configmap
  # --from-file=...` command in the comment block above. ArgoCD users
  # should add a sync-hook or a kustomize patch to populate this from
  # the real JSON file at deploy time.
  ulysses-demo-dashboard.json: |
    {"__placeholder__": "see grafana/ulysses-demo-dashboard.json — replace via oc create configmap --from-file=..."}
---
# Path A (Grafana Operator) — alternate, commented out. Requires the
# community Grafana Operator + a Grafana CR with matching instance
