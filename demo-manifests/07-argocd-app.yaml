---
# Resource tune for the operator-managed ArgoCD instance. Required on
# the Ulysses demo SNO because the default per-component requests
# (250m × ~5 components = 1.25+ vCPU) push the node over its CPU
# request ceiling when ulysses-sor is at 16 vCPU. We drop each to 50m
# (ample for demo throughput) and disable Dex + ApplicationSet which
# we don't need for a single-Application demo.
#
# Disabling SSO requires REMOVING the entire spec.sso block — setting
# spec.sso.provider="" with spec.sso.dex still present causes the
# operator to error out with "illegal SSO configuration: Cannot specify
# SSO provider spec without specifying SSO provider type" and stop
# reconciling. Same for spec.applicationSet — set to null to remove.
#
# This CR has the same name as the one auto-created by the GitOps
# operator (`openshift-gitops` in `openshift-gitops` ns), so apply
# strategic-merges into the existing instance.
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  controller:
    resources:
      requests: {cpu: "50m", memory: "128Mi"}
      limits:   {cpu: "500m", memory: "512Mi"}
  repo:
    resources:
      requests: {cpu: "50m", memory: "128Mi"}
      limits:   {cpu: "500m", memory: "512Mi"}
  redis:
    resources:
      requests: {cpu: "50m", memory: "64Mi"}
      limits:   {cpu: "500m", memory: "256Mi"}
  server:
    resources:
      requests: {cpu: "50m", memory: "128Mi"}
      limits:   {cpu: "500m", memory: "512Mi"}
  # Disable ApplicationSet controller — single-Application demo doesn't
  # need it. (sso block omitted entirely so the operator deletes Dex.)
  applicationSet: null
---
# ArgoCD Application that reconciles the whole demo topology from Git.
# Point this at the Kavara Git path where these YAMLs live; ArgoCD does
# the rest. Per our 2026-04-20 call-1 decision with Mike, Argo is the
# delivery mechanism of record — not a custom Operator — until the joint
# POC matures.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ulysses-demo
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Public repo. The repoURL must EXACTLY match the URL field of the
    # repository Secret in openshift-gitops ns (no trailing .git, since
    # the Secret was created without it — Argo does string comparison).
    repoURL: https://github.com/UlyssesModel/tiberius-openshift
    targetRevision: main
    path: demo-manifests
    directory:
      recurse: false
      # Argo's include is a Go filepath.Match glob (shell-like, not
      # regex). "0*.yaml" only matches 0-prefixed files; files
      # numbered 10+ would be silently skipped. "[01]*.yaml" covers
      # 00-19 cleanly. Widen to [0-9][0-9]-*.yaml or *.yaml when we
      # cross 20 numbered manifests. See auto-memory
      # `feedback_argocd_directory_include_glob.md` for rationale.
      include: "[01]*.yaml"     # deploys 01-…-09-…-10-…-19-… in numeric order
  destination:
    server: https://kubernetes.default.svc
    namespace: ulysses-demo
  # Sync policy is MANUAL (no automated block) — auto-sync is too
  # aggressive when we have hand-tuned cluster state from yesterday's
  # debugging (storage-class flip, listener mTLS, ConfigMap overrides
  # for OCP Console dashboard, manual ulysses-sor scaling, etc.).
  # First sync should be triggered from the Argo UI after JE eyeballs
  # the diff — auto-prune + self-heal would risk blowing away that
  # state. Once the cluster is fully reconciled to repo state and the
  # diff is clean, this can be flipped back to `automated:` if desired.
  syncPolicy:
    syncOptions:
      - CreateNamespace=false   # namespace ships in 01-namespace.yaml
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
  # Status fields + cluster-controller-managed fields that Argo would
  # otherwise show as OutOfSync drift. Captured from live Application
  # CR on 2026-04-26 after first reconcile pass; baked back into source
  # so re-applies don't widen the diff.
  ignoreDifferences:
    # Core resources — cluster-managed defaults
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /secrets
        - /imagePullSecrets
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
        - /spec/ipFamilies
        - /spec/ipFamilyPolicy
        - /spec/internalTrafficPolicy
    # Strimzi — Topic/User/Node-pool/Cluster operators write status continuously
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaNodePool
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaTopic
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: KafkaUser
      jsonPointers:
        - /status
    # Grafana Operator — status churn + spec.config the operator manages
    - group: grafana.integreatly.org
      kind: Grafana
      jsonPointers:
        - /status
        - /spec/config
    - group: grafana.integreatly.org
      kind: GrafanaDashboard
      jsonPointers:
        - /status
    - group: grafana.integreatly.org
      kind: GrafanaDatasource
      jsonPointers:
        - /status
    # Prometheus Operator (UWM) — status fields
    - group: monitoring.coreos.com
      kind: PrometheusRule
      jsonPointers:
        - /status
    - group: monitoring.coreos.com
      kind: ServiceMonitor
      jsonPointers:
        - /status
    # ArgoCD self-tracking — operator manages spec.version of its own CR
    - group: argoproj.io
      kind: ArgoCD
      jsonPointers:
        - /status
        - /spec/version
    # Deployments — HPA writes spec.replicas
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
