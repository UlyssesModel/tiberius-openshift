---
# ArgoCD Application that reconciles the whole demo topology from Git.
# Point this at the Kavara Git path where these YAMLs live; ArgoCD does
# the rest. Per our 2026-04-20 call-1 decision with Mike, Argo is the
# delivery mechanism of record — not a custom Operator — until the joint
# POC matures.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ulysses-demo
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Replace with the Kavara-internal Git path hosting this directory.
    # Example for tiberius-openshift: the repo's demo-manifests/ subdir.
    repoURL: https://github.com/UlyssesModel/tiberius-openshift.git
    targetRevision: main
    path: demo-manifests
    directory:
      recurse: false
      include: "0*.yaml"        # deploy 01-…-07-… in order
  destination:
    server: https://kubernetes.default.svc
    namespace: ulysses-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # namespace ships in 01-namespace.yaml
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
  # Ignore the Strimzi-managed KafkaTopic status drift that the Topic Operator
  # writes continuously; avoids noisy out-of-sync states in ArgoCD.
  ignoreDifferences:
    - group: kafka.strimzi.io
      kind: KafkaTopic
      jsonPointers:
        - /status
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
